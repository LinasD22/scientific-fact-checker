<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Fact Checker | Dashboard</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --bg: #f9fbfc;
            --text-light: #636e72;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--primary);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo-mark {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.2);
        }

        .logo-mark svg {
            fill: white;
            width: 30px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #dfe6e9;
            color: var(--text-light);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

      

        p {
            color: var(--text-light);
            line-height: 1.6;
            font-size: 1.1rem;
        }

       

        @keyframes slide {
            from { left: -50%; }
            to { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
       
        
        <div class="badge">Produkto vystymo projektas</div>
        
        <h1>Health Fact Checker</h1>

        <h3> Seek truth, stay healthy</h2>
        

        <p style="margin-top: 2rem; font-size: 0.9rem;">Site coming soon...</p>
    </div>

</body>
</html>
