    # restart: always
    # ports:
    #   - "8080:80"
    # environment:
    #   - PMA_HOST=db
    #   - MYSQL_ROOT_PASSWORD=K630_2 
    # depends_on:
    #   - db

volumes:
  mariadb_data: {}
