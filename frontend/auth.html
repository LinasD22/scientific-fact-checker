<!DOCTYPE html>
<html>
<head>
    <title>Fact Checker - Login</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="flex-center">

    <div class="auth-card">
        <h2 id="title">Login</h2>
        
        <div id="errorDisplay" class="error-msg"></div>

        <div id="registerFields" style="display:none;">
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
        </div>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        
        <button id="authBtn" class="button">Sign In</button>
        
        <div class="toggle-text">
            <span id="toggleQuestion">Don't have an account?</span> 
            <span id="toggleLink" class="link-span">Register</span>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
